build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 7

  LargeClass:
    active: true
    threshold: 600
  TooManyFunctions:
    active: true
    thresholdInFiles: 40
    thresholdInClasses: 30
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 20

naming:
  active: true
  FunctionNaming:
    active: true
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludeClassPattern: '.*Test$'
  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreEnums: true
  UnusedPrivateMember:
    active: true
    allowedNames: '(_|ignored|expected|serialVersionUID)'
  WildcardImport:
    active: true

formatting:
  active: true
  android: true
  autoCorrect: true

# Compose Rules (io.nlopez.compose.rules:detekt)
# The rule set name for io.nlopez.compose.rules is 'Compose'
Compose:
  active: true
  ComposeNaming:
    active: true
  ComposeModifierMissing:
    active: true
  ComposeModifierOrder:
    active: true
  ComposeParameterOrder:
    active: true
  ComposeMutableStateWriteInComposition:
    active: true
  ComposeCompositionLocalUsage:
    active: true
  ComposeReusedModifier:
    active: true
